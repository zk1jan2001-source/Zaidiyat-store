<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Zaidiyat Store</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--bg);">
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">Zaidiyat <span>Store</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-count">0</span></a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <div style="font-size:2.5rem; margin-bottom:0.5rem;">🆕</div>
      <h2>نیا اکاؤنٹ بنائیں</h2>
      <p class="subtitle">مفت میں رجسٹر کریں</p>
    </div>

    <div id="reg-error" class="alert alert-error" style="display:none;"></div>
    <div id="reg-success" class="alert alert-success" style="display:none;"></div>

    <div class="form-row">
      <div class="form-group">
        <label>پہلا نام</label>
        <input type="text" id="fname" placeholder="Muhammad">
      </div>
      <div class="form-group">
        <label>آخری نام</label>
        <input type="text" id="lname" placeholder="Ali">
      </div>
    </div>
    <div class="form-group">
      <label>ای میل</label>
      <input type="email" id="email" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>فون نمبر</label>
      <input type="tel" id="phone" placeholder="0300-1234567">
    </div>
    <div class="form-group">
      <label>پاس ورڈ</label>
      <input type="password" id="password" placeholder="کم از کم 6 حروف">
    </div>
    <div class="form-group">
      <label>پاس ورڈ دوبارہ</label>
      <input type="password" id="password2" placeholder="پاس ورڈ دہرائیں">
    </div>

    <button class="btn btn-green btn-full" onclick="doRegister()">اکاؤنٹ بنائیں</button>
    <div class="form-footer">
      <p>پہلے سے اکاؤنٹ ہے؟ <a href="login.html">لاگ ان کریں</a></p>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/app.js"></script>
<script>
function doRegister() {
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const errEl = document.getElementById('reg-error');
  const okEl = document.getElementById('reg-success');

  errEl.style.display = 'none';
  okEl.style.display = 'none';

  if (!fname || !email || !pw) { errEl.style.display='flex'; errEl.textContent='⚠️ تمام ضروری خانے بھریں۔'; return; }
  if (pw.length < 6) { errEl.style.display='flex'; errEl.textContent='⚠️ پاس ورڈ کم از کم 6 حروف کا ہو۔'; return; }
  if (pw !== pw2) { errEl.style.display='flex'; errEl.textContent='❌ پاس ورڈ ایک جیسے نہیں۔'; return; }

  const users = getUsers();
  if (users.find(u => u.email === email)) { errEl.style.display='flex'; errEl.textContent='❌ یہ ای میل پہلے سے موجود ہے۔'; return; }

  const user = { name: fname + ' ' + lname, email, phone, password: pw, role: 'customer', joined: new Date().toLocaleDateString() };
  users.push(user);
  saveUsers(users);
  setCurrentUser(user);

  okEl.style.display = 'flex';
  okEl.textContent = '✅ اکاؤنٹ بن گیا! خوش آمدید ' + user.name;
  setTimeout(() => window.location.href = 'index.html', 1200);
}
</script>
</body>
</html>
